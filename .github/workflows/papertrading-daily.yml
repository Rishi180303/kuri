name: papertrading daily

on:
  schedule:
    # 11:00 UTC = 16:30 IST = 1 hour after Indian market close at 15:30 IST.
    # Weekdays only; NSE is closed on weekends.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:  # manual trigger for testing

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    env:
      # Endpoint constructed from R2_ACCOUNT_ID per ADR 0001 naming convention.
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto  # R2 rejects standard AWS regions; "auto" routes to the bucket's region.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python and dependencies
        run: uv sync

      - name: Download state.db from R2
        run: |
          # Retry wrapper: re-attempt the wrapped command up to 3 times with a
          # 15s sleep between attempts. Defends against transient Cloudflare
          # InternalError responses on individual R2 ops. aws s3 cp / sync are
          # idempotent and convergent, so a retry simply re-attempts whatever
          # the previous attempt didn't finish.
          retry() {
            local n=0
            local max=3
            local delay=15
            until "$@"; do
              n=$((n + 1))
              if [ $n -ge $max ]; then
                echo "retry: command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "retry: attempt $n/$max failed, sleeping ${delay}s before retry" >&2
              sleep $delay
            done
          }
          mkdir -p data/papertrading
          # First-ever-run safety: bucket may be empty before the user uploads
          # the backfilled state.db. After that, this branch never triggers.
          if aws s3 ls "s3://${R2_BUCKET}/state.db" --endpoint-url "$R2_ENDPOINT" > /dev/null 2>&1; then
            retry aws s3 cp "s3://${R2_BUCKET}/state.db" data/papertrading/state.db \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress
            echo "Downloaded state.db from R2"
          else
            echo "No state.db found in R2 - first run, will create fresh"
          fi

      - name: Sync runtime data from R2
        run: |
          # See "Download state.db from R2" for retry rationale.
          retry() {
            local n=0
            local max=3
            local delay=15
            until "$@"; do
              n=$((n + 1))
              if [ $n -ge $max ]; then
                echo "retry: command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "retry: attempt $n/$max failed, sleeping ${delay}s before retry" >&2
              sleep $delay
            done
          }
          retry aws s3 sync "s3://${R2_BUCKET}/runtime/raw/" data/raw/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          retry aws s3 sync "s3://${R2_BUCKET}/runtime/features/" data/features/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          retry aws s3 sync "s3://${R2_BUCKET}/runtime/models/v1/" models/v1/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          retry aws s3 sync "s3://${R2_BUCKET}/runtime/labels/" data/labels/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          echo "Synced runtime data from R2"

      - name: Fetch today's OHLCV
        run: uv run kuri update

      - name: Recompute features through today
        run: uv run kuri features update

      - name: Run papertrading lifecycle
        run: uv run kuri papertrading run

      - name: Sync runtime data back to R2
        if: always()  # Upload partial state even if lifecycle had a non-fatal issue.
        run: |
          # See "Download state.db from R2" for retry rationale. This step was
          # the specific failure mode for scheduled run #12 on 2026-05-14 —
          # 4 of ~49 ticker uploads hit transient Cloudflare InternalError;
          # retry-wrapping eliminates that class of cron failure.
          retry() {
            local n=0
            local max=3
            local delay=15
            until "$@"; do
              n=$((n + 1))
              if [ $n -ge $max ]; then
                echo "retry: command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "retry: attempt $n/$max failed, sleeping ${delay}s before retry" >&2
              sleep $delay
            done
          }
          retry aws s3 sync data/raw/ "s3://${R2_BUCKET}/runtime/raw/" \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          retry aws s3 sync data/features/ "s3://${R2_BUCKET}/runtime/features/" \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          echo "Synced runtime data back to R2"
          # models/v1/ deliberately not uploaded — read-only in CI per ADR 0002.

      - name: Upload state.db to R2
        if: always()  # Upload even if the run had non-fatal issues so DATA_STALE rows persist.
        run: |
          # See "Download state.db from R2" for retry rationale.
          retry() {
            local n=0
            local max=3
            local delay=15
            until "$@"; do
              n=$((n + 1))
              if [ $n -ge $max ]; then
                echo "retry: command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "retry: attempt $n/$max failed, sleeping ${delay}s before retry" >&2
              sleep $delay
            done
          }
          if [ -f data/papertrading/state.db ]; then
            retry aws s3 cp data/papertrading/state.db "s3://${R2_BUCKET}/state.db" \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress
            echo "Uploaded state.db to R2"
          else
            echo "No state.db to upload - run did not create one"
            exit 1
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `papertrading workflow failed on ${new Date().toISOString().slice(0,10)}`,
              body: `The daily papertrading workflow failed. Check the [run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['papertrading', 'cron-failure']
            });
